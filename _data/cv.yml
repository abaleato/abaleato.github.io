cv:
  name: Antón Baleato Lizancos
  label: Cosmologist & BCCP Postdoctoral Fellow
  email: a.baleatolizancos@berkeley.edu
  website: https://abaleato.github.io
  summary: >
    Cosmologist working at the interface of theory and observations. My research aims to
    learn about dark energy and inflation using the CMB and galaxy surveys, harnessing fast-growing techniques like gravitational lensing, delensing, and cross-correlations.

  address:
    street: Campbell Hall 341
    city: Berkeley
    region: California
    postalCode: "94720"
    countryCode: US

  sections:
