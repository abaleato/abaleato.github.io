    Selected Talks:
      - bullet: "**DESI: Cosmological Constraints from the Joint Analysis of Galaxy Clustering and CMB Gravitational Lensing** — *3/2026, APS Global Physics Summit*"
      - bullet: "**Cosmic acceleration through a new lens: synergies between galaxy surveys and the CMB** — *12/2025, CIEMAT; 12/2025, IFAE; [9/2025, Perimeter Institute](https://pirsa.org/25090041); 9/2025, Waterloo Center for Astrophysics*"
      - bullet: "**A patchwork of ideas at the interface of CMB and LSS analyses** — *9/2024, New Physics from Old Light workshop, Cambridge; 2/2025, Univ. of Arizona*"
      - bullet: "**Harmonic analysis of discrete tracers of large-scale structure** — *7/2024, Cosmology in the Adriatic, Split; 6/2024, Univ. of Pennsylvania; [6/2024, Cosmology from Home](https://www.youtube.com/watch?v=UT2B7KaPn_E); 1/2024, LBNL*"
      - bullet: "**New data, new methods, new challenges in CMB lensing and angular clustering** — *9/2023, IFCA; 9/2023, DIPC*"
      - bullet: "**The Impact of Anisotropic Redshift Distributions on Angular Clustering** — *8/2023, Dark Energy Science Collaboration Photo-z meeting*"
      - bullet: "**New techniques for precision cosmology from angular clustering** — *9/2023 (contributed), COSMO'23, Madrid; 6/2023, SLAC & Stanford*"
      - bullet: "**Model independent variance cancellation in CMB lensing cross-correlations** — *6/2023, SLAC; 4/2023, LBNL & UCB; 4/2023 (contributed), CMB×LSS workshop, Kyoto; 2/2023, CMB-S4 Maps to Other Statistics meeting*"
      - bullet: "**A review of CMB delensing** — *7/2023, discussion organizer, Benasque; 7/2022, review talk, Key Challenges in Lensing workshop, Cambridge*"
      - bullet: "**Halo model approach to characterizing CMB lensing biases** — *7/2022, Key Challenges in Galaxy & CMB Lensing Workshop, Cambridge*"
      - bullet: "**The impact of galaxies and clusters on delensing of CMB B-mode polarization** — *7/2022, BCCP Summer workshop; 6/2022, Stanford Cosmology seminar*"
      - bullet: "**CMB lensing & delensing for fundamental physics** — *3/2022, Univ. of Hawaii; 10/2021, Czech Academy of Sciences*"

    Service:
