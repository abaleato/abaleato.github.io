      - bullet: "Organizer of the CMB Seminar and Cosmology Journal Club, UC Berkeley & LBNL (2022–24)"
      - bullet: "Chair/organizer of sessions in DESI & SO collaboration meetings and international workshops (Benasque, Cambridge, etc.)"

    Mentoring:
